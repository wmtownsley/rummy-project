<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Scored!">
  <meta name="theme-color" content="#1a1a2e">
  <title>Scored!</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preload" href="style.css" as="style">
  <link rel="preload" href="app.js" as="script">
  <style>
    /* Inline critical CSS to prevent white flash on launch */
    body { margin: 0; background: #1a1a2e; color: #f0f0f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #app { max-width: 420px; margin: 0 auto; padding: 0 16px; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <div id="main-app">

    <header id="header">
      <h1>Scored! <span class="version-tag">v7</span></h1>
      <div id="connection-status" class="status-online" title="Online">&#9679;</div>
    </header>

    <!-- Score Entry -->
    <section id="score-entry">
      <div class="player-score-card" id="player-card-0" data-player="0">
        <div class="player-name" id="player-name-0">Adeline</div>
        <div class="score-display" id="score-display-0">&mdash;</div>
        <input type="number" class="score-input" id="score-input-0" inputmode="numeric" pattern="-?[0-9]*" placeholder="0">
        <button class="plus-minus-btn" id="plus-minus-0" type="button">&plusmn;</button>
      </div>

      <div class="player-score-card" id="player-card-1" data-player="1">
        <div class="player-name" id="player-name-1">Mark</div>
        <div class="score-display" id="score-display-1">&mdash;</div>
        <input type="number" class="score-input" id="score-input-1" inputmode="numeric" pattern="-?[0-9]*" placeholder="0">
        <button class="plus-minus-btn" id="plus-minus-1" type="button">&plusmn;</button>
      </div>

      <button class="btn-save" id="save-btn" disabled>Save</button>
    </section>

    <!-- Running Totals -->
    <section id="totals-bar">
      <div class="total-item">
        <span class="total-name" id="total-name-0">Adeline</span>
        <span class="total-value" id="total-value-0"></span>
      </div>
      <div class="total-delta" id="total-delta">Loading...</div>
      <div class="total-item">
        <span class="total-name" id="total-name-1">Mark</span>
        <span class="total-value" id="total-value-1"></span>
      </div>
    </section>

    <!-- Rounds History -->
    <section id="history-section">
      <div id="rounds-list"></div>
    </section>

    <!-- Toast -->
    <div id="toast"></div>

    </div><!-- /main-app -->
  </div>

  <!-- Firebase SDK (defer to not block first paint) -->
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

  <!-- App (defer to load after Firebase) -->
  <script defer src="app.js"></script>
</body>
</html>
